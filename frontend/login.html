<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevNest AI - Login</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Animated Background Particles -->
    <div id="particles-js"></div>

    <div class="container">
        <!-- Login Form -->
        <div class="form-box" id="loginForm">
            <h2>DevNest-AI</h2>
            <p>Welcome Back!</p>
            
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <input type="text" id="loginUsername" required class="input-field">
                    <label for="loginUsername">Username</label>
                    <div class="glow-line"></div>
                </div>
                
                <div class="input-group">
                    <input type="password" id="loginPassword" required class="input-field">
                    <label for="loginPassword">Password</label>
                    <div class="glow-line"></div>
                    
                </div>

                <div id="loginError" style="display: none; color: #ff6b6b; text-align: center; margin: 15px 0; padding: 10px; background: rgba(255, 107, 107, 0.1); border-radius: 8px; border: 1px solid rgba(255, 107, 107, 0.3);"></div>
            
                
                <button type="submit" class="login-btn">
                    <span>SIGN IN</span>
                    <div class="btn-glow"></div>
                </button>
                
                <div class="signup-link">
                    Don't have an account? <a href="#" onclick="switchToRegister(event)">Register</a>
                </div>
            </form>
        </div>

        
        <!-- Register Form -->
        <div class="form-box" id="registerForm" style="display: none;">
            <h2>DevNest-AI</h2>
            <p>Create Your Account</p>
            
            <form onsubmit="handleRegister(event)">
                <div class="input-group">
                    <input type="text" id="registerUsername" required class="input-field">
                    <label for="registerUsername">Username</label>
                    <div class="glow-line"></div>
                </div>
                
                <div class="input-group">
                    <input type="email" id="registerEmail" required class="input-field">
                    <label for="registerEmail">Email</label>
                    <div class="glow-line"></div>
                </div>
                
                <div class="input-group">
                    <input type="password" id="registerPassword" required class="input-field">
                    <label for="registerPassword">Password</label>
                    <div class="glow-line"></div>
                </div>
                
                <div class="input-group">
                    <input type="password" id="confirmPassword" required class="input-field">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="glow-line"></div>
                </div>

                <div id="registerError" style="display: none; color: #ff6b6b; text-align: center; margin: 15px 0; padding: 10px; background: rgba(255, 107, 107, 0.1); border-radius: 8px; border: 1px solid rgba(255, 107, 107, 0.3);"></div>
                
                <button type="submit" class="login-btn">
                    <span>CREATE ACCOUNT</span>
                    <div class="btn-glow"></div>
                </button>
                
                <div class="signup-link">
                    Already have an account? <a href="#" onclick="switchToLogin(event)">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Particles.js Library -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>

        // Initialize Particles Background
        document.addEventListener('DOMContentLoaded', function() {
            particlesJS('particles-js', {
                "particles": {
                    "number": {
                        "value": 100,
                        "density": {
                            "enable": true,
                            "value_area": 800
                        }
                    },
                    "color": {
                        "value": "#00d4ff"
                    },
                    "shape": {
                        "type": "circle",
                        "stroke": {
                            "width": 0,
                            "color": "#000000"
                        },
                        "polygon": {
                            "nb_sides": 5
                        }
                    },
                    "opacity": {
                        "value": 0.8,
                        "random": true,
                        "anim": {
                            "enable": true,
                            "speed": 1,
                            "opacity_min": 0.4,
                            "sync": false
                        }
                    },
                    "size": {
                        "value": 5,
                        "random": true,
                        "anim": {
                            "enable": true,
                            "speed": 2,
                            "size_min": 1,
                            "sync": false
                        }
                    },
                    "line_linked": {
                        "enable": true,
                        "distance": 150,
                        "color": "#00d4ff",
                        "opacity": 0.6,
                        "width": 1.5
                    },
                    "move": {
                        "enable": true,
                        "speed": 2,
                        "direction": "none",
                        "random": true,
                        "straight": false,
                        "out_mode": "out",
                        "bounce": false,
                        "attract": {
                            "enable": true,
                            "rotateX": 600,
                            "rotateY": 1200
                        }
                    }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": {
                        "onhover": {
                            "enable": true,
                            "mode": "repulse"
                        },
                        "onclick": {
                            "enable": true,
                            "mode": "push"
                        },
                        "resize": true
                    },
                    "modes": {
                        "grab": {
                            "distance": 400,
                            "line_linked": {
                                "opacity": 1
                            }
                        },
                        "bubble": {
                            "distance": 400,
                            "size": 40,
                            "duration": 2,
                            "opacity": 8,
                            "speed": 3
                        },
                        "repulse": {
                            "distance": 100,
                            "duration": 0.4
                        },
                        "push": {
                            "particles_nb": 4
                        },
                        "remove": {
                            "particles_nb": 2
                        }
                    }
                },
                "retina_detect": true
            });
        });

    
        
        // Switch between Login and Register forms
        function switchToRegister(event) {
            event.preventDefault();
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function switchToLogin(event) {
            event.preventDefault();
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        
        const API_URL = 'http://localhost:8000';
        
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            

            // Add loading state to button
            const btn = event.target.querySelector('.login-btn');
            btn.classList.add('loading');
            btn.disabled = true;
            

            // Hide any previous errors
            const errorDiv = document.getElementById('loginError');
            if (errorDiv) {
                errorDiv.style.display = 'none';
            }
            

            try {
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);
                

                const response = await fetch('http://localhost:8000/api/login',{
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString()
                });
                
                
                const data = await response.json();
                

                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', data.username);

                     // Show success state
                    btn.classList.remove('loading');
                    btn.classList.add('success');
                    btn.querySelector('span').textContent = 'SUCCESS!';

                     // Redirect to main app after short delay
                    setTimeout(() => {
                        window.location.href = 'DevNest AI.htm';
                    }, 1000);

                } else {
                   // Error - show message
                    btn.classList.remove('loading');
                    btn.disabled = false;
                
                    let errorMsg = 'Login failed. Please check your credentials.';
                    
                    if (data.detail) {
                        if (typeof data.detail === 'string') {
                            errorMsg = data.detail;
                        } else if (Array.isArray(data.detail)) {
                            errorMsg = data.detail.map(err => {
                                if (typeof err === 'string') return err;
                                return err.msg || err.message || JSON.stringify(err);
                        }).join('\n');
                    } else if (data.detail === 'object') {
                            errorMsg = JSON.stringify(detail.message);
                    }
                }

                if (errorDiv) {
                    errorDiv.textContent = errorMsg;
                    errorDiv.style.display = 'block';

                    // Hide error after 5 seconds
                     setTimeout(() => {
                        errorDiv.style.display = 'none';
                }, 5000);

                }

                else {
                    alert(errorMsg);
                }
                    
                
            }

        } catch (error) {
                console.error('Login error:', error);
                btn.classList.remove('loading');
                btn.disabled = false;
                alert('Connection error. Please try again.');

                const errorMsg = 'Connection error. Please make sure the backend is running.';
        
                if (errorDiv) {
                    errorDiv.textContent = errorMsg;
                    errorDiv.style.display = 'block';
                } else {
                    alert(errorMsg);
                }
            }
        }
        

        // ============================================================================
        // REGISTER LOGIC 
        // ============================================================================
        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
             // Validate passwords match
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            

            // Add loading state to button
            const btn = event.target.querySelector('.login-btn');
            btn.classList.add('loading');
            btn.disabled = true;

            
            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 
                    'application/json'
                },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password:password 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    
                    btn.classList.remove('loading');
                    btn.classList.add('success');
                    btn.querySelector('span').textContent = 'ACCOUNT CREATED!';

                    setTimeout(() => {
                        alert('Account created successfully! Please login.');
                        switchToLogin(event);
                        btn.classList.remove('success');
                        btn.disabled = false;
                        btn.querySelector('span').textContent = 'CREATE ACCOUNT';
                    }, 1500);

                } else {
                    // Error - show message
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    alert(data.detail || 'Registration failed. Please try again.');
                }
            } catch (error) {
                console.error('Register error:', error);
                btn.classList.remove('loading');
                btn.disabled = false;
                alert('Connection error. Please try again.');
            }
        }

         // ============================================================================
        // BUTTON LOADING/SUCCESS STYLES
        // ============================================================================
        const style = document.createElement('style');
        style.textContent = `
            .login-btn.loading span::after {
                content: "";
                width: 14px;
                height: 14px;
                margin-left: 8px;
                border: 2px solid white;
                border-top-color: transparent;
                border-radius: 50%;
                display: inline-block;
                animation: spin 0.6s linear infinite;
            }
            
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            
            .login-btn.loading {
                pointer-events: none;
                opacity: 0.7;
            }
            
            .login-btn.success {
                background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
                border-color: #38ef7d;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
